<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chop 5ive Shawarma</title>
  <link rel="stylesheet" href="sha.css">
</head>
<body>

  <!-- HEADER -->
  <header>
  <div class="logo-container">
    <img src="chef.png" alt="Chef Logo" class="logo-icon">
    <h1 class="logo-text">CHOP 5IVE SHAWARMA</h1>
  </div>

  <div class="header-right">
    <button id="themeToggle" class="icon-btn">🌙</button>
    <button id="openCart" class="cart-btn">🛒 <span id="cart-count">0</span></button>
  </div>
  </header>

  <!-- HERO -->
<section class="hero">
  <video autoplay muted loop playsinline class="hero-video">
    <source src="shawarma.mp4" type="video/mp4">
  </video>

  <h2 class="hero-title">
    Hot & Fresh Shawarma Delivered Fast 
    <span class="fire">🔥</span>
  </h2>
</section>

  <!-- MENU -->
  <section class="menu" id="menu"></section>

  <!-- Overlay -->
  <div id="overlay"></div>

  <!-- CART DRAWER -->
  <div id="cartDrawer" class="cart-drawer">
    <div class="cart-header">
      <button id="closeCart" class="back-btn">⬅</button>
      <h2>Your Cart</h2>
    </div>

    <div id="emptyMessage">Your cart is empty 🛒</div>
    <ul id="cart"></ul>

    <div class="totals">
      <h3>Subtotal: ₦<span id="subtotal">0</span></h3>
      <h3>Delivery: ₦500</h3>
      <h2>Total: ₦<span id="total">0</span></h2>
    </div>

    <input type="text" id="address" placeholder="Enter delivery address">
    <select id="payment">
      <option>Cash on Delivery</option>
      <option>Card Payment</option>
      <option>Bank Transfer</option>
    </select>

    <button class="checkout" id="checkoutBtn">Place Order</button>
  </div>

  <script src="sha.js"></script>
</body>
</html>

  <script src="sha.js"></script>
</body>
</html>
