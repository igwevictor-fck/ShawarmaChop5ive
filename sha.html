<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shawarma Chop 5ive</title>
<link rel="stylesheet" href="sha.css">
</head>
<body>

<header>
    <!-- Chef Icon Added -->
    <h1>👨‍🍳🌯 Shawarma Chop 5ive</h1>
    <div class="header-right">
        <button id="themeToggle">🌙</button>
        <button id="openCart">🛒 <span id="cart-count">0</span></button>
    </div>
</header>

<section class="hero">
    <h2>Hot & Fresh Shawarma Delivered Fast 🔥</h2>
</section>

<section class="menu">

<!-- First Card -->
<div class="card">
<img src="https://images.unsplash.com/photo-1529006557810-274b9b2fc783?auto=format&fit=crop&w=900&q=80" alt="Shawarma + 1 Hotdog">
<h3>Shawarma + 1 Hotdog</h3>
<p>₦2500</p>
<button onclick="addToCart('Shawarma + 1 Hotdog',2500)">Add to Cart</button>
</div>

<!-- Second Card (Shawarma + 2 Hotdogs) -->
<div class="card">
<img src="https://images.unsplash.com/photo-1603052876380-fb0f7c5b8738?auto=format&fit=crop&w=900&q=80" alt="Shawarma + 2 Hotdogs">
<h3>Shawarma + 2 Hotdogs</h3>
<p>₦3000</p>
<button onclick="addToCart('Shawarma + 2 Hotdogs',3000)">Add to Cart</button>
</div>

</section>

<!-- CART DRAWER -->
<div id="cartDrawer" class="cart-drawer">
<h2>Your Cart</h2>
<ul id="cart"></ul>

<h3>Subtotal: ₦<span id="subtotal">0</span></h3>
<h3>Delivery: ₦500</h3>
<h2>Total: ₦<span id="total">0</span></h2>

<input type="text" id="address" placeholder="Enter delivery address">
<select id="payment">
<option>Cash on Delivery</option>
<option>Card Payment</option>
<option>Bank Transfer</option>
</select>

<button class="checkout" onclick="checkout()">Place Order</button>
<button id="closeCart" class="close-btn">Close</button>
</div>

<script src="sha.js"></script>
</body>
</html>

</body>
</html>
